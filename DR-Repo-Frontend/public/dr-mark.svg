<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-labelledby="title desc">
  <title id="title">DR Mark</title>
  <desc id="desc">Red square mark with DR lettering</desc>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d3001f" />
      <stop offset="1" stop-color="#8f0015" />
    </linearGradient>
  </defs>
  <rect x="8" y="8" width="104" height="104" rx="16" fill="url(#g)" />
  <text x="60" y="74" text-anchor="middle" fill="#ffffff" font-size="48" font-family="Segoe UI, Arial, sans-serif" font-weight="800" letter-spacing="2">DR</text>
</svg>
